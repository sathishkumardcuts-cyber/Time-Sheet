    <!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { margin: 0; font-family: sans-serif; background: #f5f6fa; padding-bottom: 80px; }
        .header { padding: 20px; background: #fff; border-bottom: 1px solid #ddd; }
        .roadmap { padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        
        .roadmap-card { background: white; padding: 15px; border-radius: 12px; border-left: 5px solid #007bff; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .roadmap-card h3 { margin: 0 0 5px 0; font-size: 1rem; }
        
        /* Modal Styles */
        #reportModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 2000; }
        .modal-content { background: white; margin: 20% auto; padding: 20px; width: 80%; border-radius: 12px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
    </style>
</head>
<body>

    <div class="header">
             <div class="card">
            <h3>Today's Progress</h3>
            <p style="color: #666; margin-top: 10px;">No updates submitted yet for June 16.</p>
        <button onclick="document.getElementById('reportModal').style.display='block'" 
                style="width: 100%; padding: 15px; background: #007bff; color: white; border: none; border-radius: 8px; font-weight: bold;">
            + New Daily Report
        </button>
    </div>
        </div>


    <!-- The Roadmap List -->
    <div class="roadmap" id="roadmapList">
        <!-- New reports will appear here -->
    </div>

    <!-- Modal Form -->
    <div id="reportModal">
        <div class="modal-content">
            <h3>New Report</h3>
            <input type="text" id="reportTitle" placeholder="Report Title (e.g. Work Done)">
            <button onclick="saveReport()" style="width:100%; padding: 10px; background: #27ae60; color:white; border:none; border-radius:5px;">Save Report</button>
            <button onclick="document.getElementById('reportModal').style.display='none'" style="width:100%; padding: 10px; background: #c0392b; color:white; border:none; border-radius:5px; margin-top:10px;">Cancel</button>
        </div>
    </div>

    <script>
        // Load existing reports on startup
        window.onload = loadReports;

        function saveReport() {
            const title = document.getElementById('reportTitle').value;
            if(title) {
                const reports = JSON.parse(localStorage.getItem('myReports') || '[]');
                reports.push(title);
                localStorage.setItem('myReports', JSON.stringify(reports));
                document.getElementById('reportTitle').value = '';
                document.getElementById('reportModal').style.display = 'none';
                loadReports();
            }
        }

        function loadReports() {
            const list = document.getElementById('roadmapList');
            const reports = JSON.parse(localStorage.getItem('myReports') || '[]');
            list.innerHTML = reports.map(r => `<div class="roadmap-card"><h3>${r}</h3><p>Successfully filed.</p></div>`).join('');
        }
    </script>
</body>
</html>
